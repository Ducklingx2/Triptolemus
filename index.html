<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triptolemus - Coming Soon</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle at center, #0a0f1f, #05060a);
        font-family: Arial, sans-serif;
        color: white;
        overflow: hidden;
    }

    .container {
        text-align: center;
        animation: fadeIn 1.5s ease-in-out;
    }

    .title {
        font-size: 60px;
        font-weight: bold;
        letter-spacing: 3px;
    }

    .subtitle {
        margin-top: 10px;
        font-size: 16px;
        opacity: 0.7;
        letter-spacing: 5px;
    }

    .coming {
        margin-top: 30px;
        font-size: 20px;
        letter-spacing: 8px;
        opacity: 0.9;
        animation: pulse 2s infinite;
    }

    @keyframes pulse {
        0%, 100% { opacity: 0.4; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.05); }
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* subtle glow */
    .glow {
        position: absolute;
        width: 400px;
        height: 400px;
        background: radial-gradient(circle, rgba(0,255,255,0.08), transparent 70%);
        border-radius: 50%;
        filter: blur(40px);
        z-index: -1;
    }
</style>
</head>

<body>

<div class="glow"></div>

<div class="container">
    <div class="title">TRIPTOLEMUS</div>
    <div class="subtitle">HIGGS FIELD DIVISION</div>
    <div class="coming">COMING SOON</div>
</div>

</body>
</html>
