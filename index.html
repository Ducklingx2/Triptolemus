<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Triptolemus</title>

<!-- Font (Agrandir is not freely hosted, so we simulate it cleanly) -->
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        font-family: 'Space Grotesk', sans-serif;
        background: radial-gradient(circle at top, #0b0f1a, #05060a);
        color: white;
        overflow-x: hidden;
    }

    /* HEADER */
    .header {
        text-align: center;
        padding-top: 60px;
    }

    .higgs {
        font-size: 14px;
        letter-spacing: 6px;
        opacity: 0.7;
        text-transform: uppercase;
    }

    .brand {
        font-size: 48px;
        font-weight: 700;
        margin-top: 10px;
        animation: bounce 2s infinite;
    }

    @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }

    /* MAIN CARD */
    .card {
        width: 320px;
        height: 320px;
        margin: 80px auto;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(20px);
        transition: transform 0.2s ease;
        position: relative;
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .logo {
        font-size: 28px;
        font-weight: 600;
        text-align: center;
        cursor: pointer;
        user-select: none;
        transition: transform 0.2s ease;
    }

    .glow {
        position: absolute;
        width: 200px;
        height: 200px;
        background: radial-gradient(circle, rgba(0,255,255,0.2), transparent);
        border-radius: 50%;
        filter: blur(20px);
    }

    /* BUTTON SECTION */
    .buttons {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 40px;
    }

    .btn {
        padding: 12px 20px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.2);
        background: rgba(255,255,255,0.05);
        color: white;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn:hover {
        transform: scale(1.1);
        background: rgba(0,255,255,0.1);
        border-color: rgba(0,255,255,0.4);
    }

</style>
</head>

<body>

<div class="header">
    <div class="higgs">Higgs Field</div>
    <div class="brand">Triptolemus</div>
</div>

<div class="card" id="card">
    <div class="glow"></div>
    <div class="logo" id="logo">
        TRIPTOLEMUS<br/>
        <span style="font-size:14px;opacity:0.7;">AI Robotics Division</span>
    </div>
</div>

<div class="buttons">
    <div class="btn">Enter System</div>
    <div class="btn">Explore</div>
    <div class="btn">About</div>
</div>

<script>
    // MAGNETIC HOVER EFFECT
    const card = document.getElementById("card");
    const logo = document.getElementById("logo");

    card.addEventListener("mousemove", (e) => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        const centerX = rect.width / 2;
        const centerY = rect.height / 2;

        const deltaX = (x - centerX) / 15;
        const deltaY = (y - centerY) / 15;

        logo.style.transform = `translate(${deltaX}px, ${deltaY}px) scale(1.05)`;
    });

    card.addEventListener("mouseleave", () => {
        logo.style.transform = "translate(0px, 0px) scale(1)";
    });
</script>

</body>
</html>
