<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Triptolemus</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #0e0e12, #050507);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    .container {
      text-align: center;
      position: relative;
    }

    .higgs {
      font-size: 14px;
      letter-spacing: 0.4em;
      color: rgba(255,255,255,0.5);
      margin-bottom: 20px;
      font-family: 'Inter', sans-serif;
      text-transform: uppercase;
    }

    .logo {
      width: 220px;
      height: 220px;
      border-radius: 28px;
      background: linear-gradient(145deg, #1a1a22, #0b0b10);
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 42px;
      font-weight: 800;
      color: white;
      transition: transform 0.2s ease;
      position: relative;
      cursor: pointer;
      animation: float 4s ease-in-out infinite;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .logo span {
      font-size: 12px;
      position: absolute;
      bottom: 18px;
      opacity: 0.5;
      letter-spacing: 0.2em;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
      100% { transform: translateY(0px); }
    }

    .glow {
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(120,120,255,0.15), transparent 70%);
      filter: blur(20px);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: -1;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="higgs">HIGGS FIELD</div>

    <div class="glow"></div>

    <div class="logo" id="logo">
      TRIPTOLE
      <span>MECH</span>
    </div>
  </div>

  <script>
    const logo = document.getElementById('logo');

    document.addEventListener('mousemove', (e) => {
      const rect = logo.getBoundingClientRect();
      const x = e.clientX - rect.left - rect.width / 2;
      const y = e.clientY - rect.top - rect.height / 2;

      const distance = Math.sqrt(x*x + y*y);
      const maxMove = 20;

      if (distance < 200) {
        logo.style.transform = `translate(${x * 0.1}px, ${y * 0.1}px)`;
      } else {
        logo.style.transform = `translate(0px, 0px)`;
      }
    });

    logo.addEventListener('mouseleave', () => {
      logo.style.transform = 'translate(0px, 0px)';
    });
  </script>

</body>
</html>
